<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velocity Vortex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; user-select: none;
    }

    #speed {
      position: absolute; bottom: 24px; left: 24px;
      color: #fff; font-size: 28px; font-weight: bold;
      text-shadow: 2px 2px 6px #000;
    }

    #turbo-wrap {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    #turbo-label {
      color: rgba(255,255,255,0.8); font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase;
    }
    #turbo-bar {
      width: 220px; height: 14px;
      background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.5);
      border-radius: 7px; overflow: hidden;
    }
    #turbo-fill {
      height: 100%; width: 0%; background: #4af;
      border-radius: 5px; transition: background 0.15s;
    }

    #drift-indicator {
      position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
      font-size: 18px; font-weight: bold; letter-spacing: 3px;
      opacity: 0; transition: opacity 0.15s;
      text-shadow: 0 0 12px currentColor;
    }

    #lap-info {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 18px; font-weight: bold;
      text-shadow: 2px 2px 4px #000;
    }

    #timer {
      position: absolute; top: 46px; left: 50%; transform: translateX(-50%);
      color: #ffdd44; font-size: 22px; font-weight: bold;
      text-shadow: 2px 2px 4px #000;
    }

    #controls {
      position: absolute; bottom: 24px; right: 24px;
      color: rgba(255,255,255,0.6); font-size: 13px;
      line-height: 1.7; text-align: right;
    }

    #boost-flash {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(100,200,255,0.3) 0%, transparent 70%);
      opacity: 0; pointer-events: none; transition: opacity 0.1s;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="speed">0 <span style="font-size:14px">km/h</span></div>
    <div id="turbo-wrap">
      <div id="turbo-label">Mini-Turbo</div>
      <div id="turbo-bar"><div id="turbo-fill"></div></div>
    </div>
    <div id="drift-indicator"></div>
    <div id="lap-info">LAP 1 / 3</div>
    <div id="timer">0:00.000</div>
    <div id="controls">
      W / ↑ &nbsp; Accelerate<br>
      S / ↓ &nbsp; Brake / Reverse<br>
      A D / ← → &nbsp; Steer<br>
      Space / Shift &nbsp; Drift<br>
      <span style="color:#ffdd44">Hold drift while turning → Mini-Turbo!</span>
    </div>
    <div id="boost-flash"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
