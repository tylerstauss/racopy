        }
        #gameCanvas {
            width: 800px;
            height: 500px;
            background: #4a6a4a;
            cursor: crosshair;

            border-radius: 10px;
            display: block;
        }

            position: relative;
            width: 240px;
            height: 180px;
            background-color: #111;
            border: 4px solid #4a4a4a;
            overflow: hidden;
            margin-top: 10px;
            border-radius: 8px;
        }
        .player-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
            z-index: 10;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .enemy-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff0000;
            z-index: 9;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding: 6px 12px;
            background: #1a2a1a;
            border-radius: 30px;
            border: 2px solid #4a7a4a;
            color: #b0e0b0;
            font-size: 14px;
            gap: 12px;
        }
        .health-bar-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #healthBarBg {
            width: 100px;
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
        }
        #healthBarFill {
            height: 100%;
            width: 100%;
            background: #4caf50;
            border-radius: 6px;
            transition: background 0.3s;
        }
        button {
            background: #2a4a2a;
            border: none;
            color: #cdffcd;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
            border-bottom: 3px solid #1a2e1a;

        }
        #lobby {

            background: #0a140a;

            align-items: center;
            justify-content: center;

    ];

    function mapSolid(tx, ty) {
        if (tx < 0 || tx >= MAP_WIDTH || ty < 0 || ty >= MAP_HEIGHT) return true;
        return MAP[ty][tx] > 0;
    }

    // ---- GAME STATE --------------------------------------------------------
    let gameRunning = false;
    let damageFlash = 0;
    let gun = { recoil: 0, muzzleFlash: 0, cooldown: 0 };

    let player = {
        x: 30 * CS,
        y: 42 * CS,
        angle: -Math.PI / 2, // facing north
        health: 100,
        ammo: 24,
        maxAmmo: 24,
        bobPhase: 0,
        bobOffset: 0
    };

    const ENEMY_SPAWN = [
        { x:  5 * CS, y:  5 * CS },
        { x: 20 * CS, y:  5 * CS },
        { x: 40 * CS, y:  5 * CS },
        { x: 55 * CS, y:  5 * CS },
        { x:  5 * CS, y: 22 * CS },
        { x: 15 * CS, y: 17 * CS },
        { x: 30 * CS, y: 22 * CS },
        { x: 45 * CS, y: 17 * CS },
        { x: 55 * CS, y: 22 * CS },
        { x:  5 * CS, y: 38 * CS },
        { x: 20 * CS, y: 33 * CS },
        { x: 40 * CS, y: 38 * CS },
        { x: 57 * CS, y: 38 * CS },
        { x: 30 * CS, y: 18 * CS },
        { x: 52 * CS, y: 28 * CS },
    ];

    let enemies = [];
    function spawnEnemies() {
        enemies = ENEMY_SPAWN.map((sp, i) => ({
            x: sp.x, y: sp.y,

        }));

    function randomWaypoint() {
        for (let attempt = 0; attempt < 200; attempt++) {
            const tx = 1 + Math.floor(Math.random() * (MAP_WIDTH - 2));
            const ty = 1 + Math.floor(Math.random() * (MAP_HEIGHT - 2));
            if (MAP[ty][tx] === 0) return { x: (tx + 0.5) * CS, y: (ty + 0.5) * CS };
        }
        return { x: 30 * CS, y: 22 * CS };
    }

    let keys = {};
    let zBuffer = new Float32Array(CW);
    let loopId = 0;
    let bulletTrails = [];

    // ---- INPUT -------------------------------------------------------------
    canvas.addEventListener('click', () => {
        if (!document.pointerLockElement) {
            canvas.requestPointerLock();
        } else if (gameRunning) {
            shoot();
        }
    });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement === canvas && gameRunning) {
            player.angle += e.movementX * 0.0025;
        }
    });

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
        if ((e.code === 'ControlLeft' || e.code === 'ControlRight') && gameRunning) shoot();
        if (e.code === 'Space' && gameRunning) shoot();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // ---- RAYCASTER ---------------------------------------------------------
    const FOV = Math.PI / 2.5;
    const HALF_FOV = FOV / 2;

    // Wall colors: [NS-side, EW-side]
    const WALL_COLORS = {
        1: ['#7a6a5a', '#5a4a3a'], // stone
        2: ['#8b5a2b', '#6b3a1b'], // bookshelf
    };

    function render3D() {
        const horizonY = Math.round(CH / 2 + player.bobOffset);

        // Pre-allocate wall data arrays
        const wTop    = new Int32Array(CW);
        const wBot    = new Int32Array(CW);
        const wTopRaw = new Float32Array(CW);
        const wH      = new Float32Array(CW);
        const wTexX   = new Float32Array(CW);
        const wTile   = new Uint8Array(CW);
        const wSide   = new Uint8Array(CW);
        const wMX     = new Int16Array(CW);
        const wMY     = new Int16Array(CW);

        // Raycast all columns
        for (let col = 0; col < CW; col++) {
            const rayAngle = player.angle - HALF_FOV + col * (FOV / CW);
            const rdx = Math.cos(rayAngle), rdy = Math.sin(rayAngle);
            let mx = Math.floor(player.x / CS), my = Math.floor(player.y / CS);
            const ddx = Math.abs(1 / rdx), ddy = Math.abs(1 / rdy);
            const stepX = rdx < 0 ? -1 : 1, stepY = rdy < 0 ? -1 : 1;
            let sdx = rdx < 0 ? (player.x/CS - mx)*ddx : (mx+1 - player.x/CS)*ddx;
            let sdy = rdy < 0 ? (player.y/CS - my)*ddy : (my+1 - player.y/CS)*ddy;
            let hit = false, side = 0, tile = 1;
            for (let i = 0; i < 64 && !hit; i++) {
                if (sdx < sdy) { sdx += ddx; mx += stepX; side = 0; }
                else            { sdy += ddy; my += stepY; side = 1; }
                if (mx < 0 || mx >= MAP_WIDTH || my < 0 || my >= MAP_HEIGHT) { hit = true; tile = 1; }
                else if (MAP[my][mx] > 0) { hit = true; tile = MAP[my][mx]; }
            }
            if (!hit) { zBuffer[col] = 999; continue; }
            const perpDist = side === 0
                ? (mx - player.x/CS + (1-stepX)/2) / rdx
                : (my - player.y/CS + (1-stepY)/2) / rdy;
            const corrDist = perpDist * Math.cos(rayAngle - player.angle);
            zBuffer[col] = corrDist;
            const wallHeight = Math.min(CH * 3, (CH / corrDist) * 1.5);
            const rawTop = horizonY - wallHeight / 2;
            wTopRaw[col] = rawTop;
            wTop[col] = Math.max(0, Math.round(rawTop));
            wBot[col] = Math.min(CH, Math.round(horizonY + wallHeight / 2));
            wH[col]   = wallHeight;
            let wx = side === 0 ? player.y/CS + perpDist*rdy : player.x/CS + perpDist*rdx;
            wTexX[col] = wx - Math.floor(wx);
            wTile[col] = tile; wSide[col] = side; wMX[col] = mx; wMY[col] = my;
        }

        // Single-pass pixel fill
        const imgData = ctx.createImageData(CW, CH);
        const data = imgData.data;
        const rdLX = Math.cos(player.angle - HALF_FOV), rdLY = Math.sin(player.angle - HALF_FOV);
        const rdRX = Math.cos(player.angle + HALF_FOV), rdRY = Math.sin(player.angle + HALF_FOV);

        for (let y = 0; y < CH; y++) {
            const isFloor = y > horizonY;
            const rowY = Math.abs(y - horizonY) || 0.01;
            const rowDist = (CH * 0.5) / rowY;
            let fx = player.x/CS + rowDist * rdLX;
            let fy = player.y/CS + rowDist * rdLY;
            const fsX = rowDist * (rdRX - rdLX) / CW;
            const fsY = rowDist * (rdRY - rdLY) / CW;
            const fShade = Math.max(0, Math.min(1,
                isFloor ? 0.92 - rowDist * 0.07 : 0.44 - rowDist * 0.04));

            for (let x = 0; x < CW; x++) {
                const pidx = (y * CW + x) << 2;

                if (y >= wTop[x] && y < wBot[x] && wBot[x] > wTop[x]) {
                    // WALL — textured stone or bookshelf
                    const wallY = (y - wTopRaw[x]) / wH[x];
                    const wx = wTexX[x];
                    const shade = Math.max(0.05, 1.0 - zBuffer[x] * 0.018);
                    const sD = wSide[x] ? 0.68 : 1.0;
                    let r, g, b;
                    if (wTile[x] === 1) {
                        // Two-toned masonry: grey top → green bottom with gradient
                        const byI = Math.floor(wallY * 3);
                        const bxR = wx * 4 + (byI % 2 === 0 ? 0 : 0.5);
                        const bxI = Math.floor(bxR);
                        const bxF = bxR - bxI, byF = wallY * 3 - byI;
                        const grout = bxF < 0.07 || bxF > 0.93 || byF < 0.065 || byF > 0.935;
                        if (grout) {
                            r = 22; g = 24; b = 20;
                        } else {
                            const h = ((bxI * 73856093) ^ (byI * 19349663) ^ (wMX[x] * 5765169) ^ (wMY[x] * 2341253)) & 0xFF;
                            const n = (h / 255) * 24 - 12;
                            // Lerp: wallY=0 (top) = grey, wallY=1 (bottom) = green
                            r = Math.round(116 + (52  - 116) * wallY + n * 0.5);
                            g = Math.round(113 + (94  - 113) * wallY + n * 0.4);
                            b = Math.round(107 + (42  - 107) * wallY + n * 0.2);
                        }
                    } else {
                        // Bookshelf — colored spines
                        const shelf = Math.floor(wallY * 4);
                        const sF = wallY * 4 - shelf;
                        if (sF < 0.06 || sF > 0.94) { r = 88; g = 55; b = 24; }
                        else {
                            const bk = Math.floor(wx * 10);
                            const h = ((bk * 1234567) ^ (shelf * 7654321) ^ (wMX[x] * 5765169)) & 0xFF;
                            const v = h / 255;
                            if (v < 0.33) { r = 168; g = 42; b = 42; }
                            else if (v < 0.66) { r = 42; g = 88; b = 145; }
                            else { r = 132; g = 118; b = 42; }
                        }
                    }
                    const s = shade * sD;
                    data[pidx]   = Math.round(r * s);
                    data[pidx+1] = Math.round(g * s);
                    data[pidx+2] = Math.round(b * s);

                } else if (isFloor) {
                    // FLOOR — GoldenEye beige stone tiles with grout lines (small tiles)
                    const tfx = fx * 4, tfy = fy * 4;
                    const tX = tfx - Math.floor(tfx);
                    const tY = tfy - Math.floor(tfy);
                    if (tX < 0.07 || tX > 0.93 || tY < 0.07 || tY > 0.93) {
                        data[pidx]   = Math.round(95  * fShade);
                        data[pidx+1] = Math.round(88  * fShade);
                        data[pidx+2] = Math.round(72  * fShade);
                    } else {
                        const h = ((Math.floor(tfx) * 73856093) ^ (Math.floor(tfy) * 19349663)) & 0xFF;
                        const base = 162 + Math.round((h / 255) * 24);
                        data[pidx]   = Math.round(base       * fShade);
                        data[pidx+1] = Math.round((base - 12) * fShade);
                        data[pidx+2] = Math.round((base - 34) * fShade);
                    }

                } else {
                    // CEILING — dark stone
                    data[pidx]   = Math.round(50 * fShade);
                    data[pidx+1] = Math.round(48 * fShade);
                    data[pidx+2] = Math.round(44 * fShade);
                }

                data[pidx+3] = 255;
                fx += fsX; fy += fsY;
            }
        }

        ctx.putImageData(imgData, 0, 0);
    }

    // ---- ENEMY RENDERING ---------------------------------------------------
    function drawEnemies() {
        const active = enemies.filter(e => e.active);
        // Sort farthest first
        active.sort((a, b) => {
            const da = (a.x - player.x)**2 + (a.y - player.y)**2;
            const db = (b.x - player.x)**2 + (b.y - player.y)**2;
            return db - da;
        });

        for (const e of active) {
            const dx = e.x - player.x;
            const dy = e.y - player.y;
            const distWorld = Math.sqrt(dx * dx + dy * dy);
            if (distWorld < 1) continue;

            const enemyAngle = Math.atan2(dy, dx);
            let angleDiff = enemyAngle - player.angle;
            while (angleDiff >  Math.PI) angleDiff -= 2 * Math.PI;
            while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;

            if (Math.abs(angleDiff) > HALF_FOV + 0.25) continue;

            const screenX = Math.round(CW / 2 + (angleDiff / FOV) * CW);

            // corrDist must be in CELL units to match zBuffer values
            const corrDist = (distWorld / CS) * Math.cos(angleDiff);
            if (corrDist <= 0) continue;

            const spriteH = Math.min(CH * 0.95, (CH / corrDist) * 2.0);
            const spriteW = Math.round(spriteH * 0.55);
            const sx = Math.round(screenX - spriteW / 2);
            const sy = Math.round(CH / 2 + player.bobOffset - spriteH / 2);

            const shade = Math.max(0.15, Math.min(1, 1.2 - corrDist * 0.016));

            // Quick visibility check across sprite width
            let visible = false;
            for (let check = 0; check <= 6; check++) {
                const col = Math.round(sx + spriteW * (check / 6));
                if (col >= 0 && col < CW && corrDist < zBuffer[col]) {
                    visible = true; break;
                }
            }
            if (!visible) continue;

            // Build Z-buffer clip path so enemy is hidden behind walls
            ctx.save();
            ctx.beginPath();
            for (let col = 0; col < spriteW; col++) {
                const px = sx + col;
                if (px >= 0 && px < CW && corrDist < zBuffer[px]) {
                    ctx.rect(px, 0, 1, CH);
                }
            }
            ctx.clip();

            drawHumanFigure(sx, sy, spriteW, spriteH, shade, e.type);
            ctx.restore();
        }
    }

    function drawHumanFigure(sx, sy, sw, sh, shade, type) {
        const s = shade;
        const c = (r, g, b) => `rgb(${Math.round(r*s)},${Math.round(g*s)},${Math.round(b*s)})`;

        // Proportions (must sum to 1.0)
        const headH  = sh * 0.20;
        const neckH  = sh * 0.03;
        const torsoH = sh * 0.30;
        const legH   = sh * 0.38;
        const bootH  = sh * 0.09;
        const headY  = sy;
        const neckY  = headY + headH;
        const torsoY = neckY + neckH;
        const legY   = torsoY + torsoH;
        const bootY  = legY + legH;

        const hm  = sw * 0.24;  // head margin
        const nm  = sw * 0.36;  // neck margin
        const bm  = sw * 0.08;  // body margin
        const aw  = sw * 0.14;  // arm width
        const lw  = (sw - bm*2) * 0.44;
        const lgp = sw - bm*2 - lw*2;
        const llx = sx + bm;
        const lrx = llx + lw + lgp;

        if (type === 0) {
            // === BLACK SUIT GUARD (GoldenEye tuxedo style) ===
            const skR=200,skG=162,skB=124;
            const jkR=26, jkG=26, jkB=30;   // dark jacket
            const ptR=20, ptG=20, ptB=26;   // dark trousers
            const shR=228,shG=226,shB=220;  // white shirt

            // Hair (dark, slicked back)
            ctx.fillStyle = c(40,32,24);
            ctx.fillRect(sx+hm, headY, sw-hm*2, headH*0.32);
            // Hair side shadow
            ctx.fillStyle = c(30,24,18);
            ctx.fillRect(sx+hm, headY, sw*0.07, headH*0.32);

            // Face
            ctx.fillStyle = c(skR,skG,skB);
            ctx.fillRect(sx+hm, headY+headH*0.30, sw-hm*2, headH*0.70);
            // Ear bumps
            ctx.fillStyle = c(skR-14,skG-14,skB-10);
            ctx.fillRect(sx+hm-3, headY+headH*0.44, Math.max(2,sw*0.05), headH*0.28);
            ctx.fillRect(sx+sw-hm-1, headY+headH*0.44, Math.max(2,sw*0.05), headH*0.28);
            // Brow shadow
            ctx.fillStyle = c(skR-22,skG-22,skB-16);
            ctx.fillRect(sx+hm, headY+headH*0.44, sw-hm*2, headH*0.09);
            // Eyes (shadow socket + dark iris)
            const eyeW=Math.max(1,(sw-hm*2)*0.20), eyeH=Math.max(1,headH*0.14);
            const eyeY=headY+headH*0.52;
            ctx.fillStyle = c(skR-38,skG-38,skB-28);
            ctx.fillRect(sx+hm+(sw-hm*2)*0.10, eyeY, eyeW, eyeH);
            ctx.fillRect(sx+hm+(sw-hm*2)*0.58, eyeY, eyeW, eyeH);
            ctx.fillStyle = c(18,14,10);
            ctx.fillRect(sx+hm+(sw-hm*2)*0.13, eyeY+1, eyeW*0.6, eyeH*0.65);
            ctx.fillRect(sx+hm+(sw-hm*2)*0.61, eyeY+1, eyeW*0.6, eyeH*0.65);
            // Nose bridge
            ctx.fillStyle = c(skR-20,skG-22,skB-16);
            ctx.fillRect(sx+sw/2-1, eyeY+eyeH, Math.max(1,sw*0.03), headH*0.13);
            // Mouth
            ctx.fillStyle = c(skR-32,skG-42,skB-36);
            ctx.fillRect(sx+hm+(sw-hm*2)*0.30, headY+headH*0.80, (sw-hm*2)*0.40, Math.max(1,headH*0.07));
            // Jaw / chin shadow
            ctx.fillStyle = c(skR-14,skG-16,skB-12);
            ctx.fillRect(sx+hm, headY+headH*0.88, sw-hm*2, headH*0.12);

            // Neck + white collar
            ctx.fillStyle = c(skR-10,skG-10,skB-8);
            ctx.fillRect(sx+nm, neckY, sw-nm*2, neckH);
            ctx.fillStyle = c(shR,shG,shB);
            ctx.fillRect(sx+nm-2, neckY, sw-nm*2+4, neckH*0.55);

            // Jacket body
            ctx.fillStyle = c(jkR,jkG,jkB);
            ctx.fillRect(sx+bm, torsoY, sw-bm*2, torsoH);
            // White shirt visible in jacket V — tapering strips
            for (let row=0;row<12;row++){
                const t=row/12;
                const vw=sw*0.09 + (sw*0.30-sw*0.09)*t;
                ctx.fillStyle = c(shR,shG,shB);
                ctx.fillRect(sx+sw/2-vw/2, torsoY+torsoH*0.04+row*torsoH*0.08, vw, torsoH*0.08+1);
            }
            // Bow tie
            ctx.fillStyle = c(18,14,14);
            ctx.fillRect(sx+sw/2-sw*0.09, torsoY+torsoH*0.04, sw*0.18, torsoH*0.07);
            ctx.fillStyle = c(35,28,28);
            ctx.fillRect(sx+sw/2-sw*0.02, torsoY+torsoH*0.04, sw*0.04, torsoH*0.07); // knot
            // Left lapel (slightly lighter than jacket)
            ctx.fillStyle = c(jkR+10,jkG+10,jkB+14);
            ctx.fillRect(sx+bm, torsoY, sw*0.26, torsoH*0.50);
            // Right lapel
            ctx.fillRect(sx+sw-bm-sw*0.26, torsoY, sw*0.26, torsoH*0.50);
            // Jacket seam shadow
            ctx.fillStyle = c(jkR-5,jkG-5,jkB-4);
            ctx.fillRect(sx+sw/2-1, torsoY+torsoH*0.50, 2, torsoH*0.50);
            // Jacket button
            ctx.fillStyle = c(shR-10,shG-10,shB-10);
            ctx.fillRect(sx+sw/2-1, torsoY+torsoH*0.62, Math.max(1,sw*0.04), Math.max(1,sw*0.04));

            // Arms (jacket)
            ctx.fillStyle = c(jkR,jkG,jkB);
            ctx.fillRect(sx, torsoY+torsoH*0.04, aw, torsoH*0.76);
            ctx.fillRect(sx+sw-aw, torsoY+torsoH*0.04, aw, torsoH*0.76);
            // Arm highlight (lighter front edge)
            ctx.fillStyle = c(jkR+8,jkG+8,jkB+10);
            ctx.fillRect(sx+1, torsoY+torsoH*0.06, Math.max(1,aw*0.3), torsoH*0.70);
            ctx.fillRect(sx+sw-aw+1, torsoY+torsoH*0.06, Math.max(1,aw*0.3), torsoH*0.70);
            // White shirt cuffs
            ctx.fillStyle = c(shR,shG,shB);
            ctx.fillRect(sx, torsoY+torsoH*0.76, aw, torsoH*0.10);
            ctx.fillRect(sx+sw-aw, torsoY+torsoH*0.76, aw, torsoH*0.10);
            // Hands (fists)
            ctx.fillStyle = c(skR,skG,skB);
            ctx.fillRect(sx, torsoY+torsoH*0.86, aw, torsoH*0.14);
            ctx.fillRect(sx+sw-aw, torsoY+torsoH*0.86, aw, torsoH*0.14);
            ctx.fillStyle = c(skR-16,skG-16,skB-12);
            ctx.fillRect(sx, torsoY+torsoH*0.94, aw, torsoH*0.06);
            ctx.fillRect(sx+sw-aw, torsoY+torsoH*0.94, aw, torsoH*0.06);

            // Trousers
            ctx.fillStyle = c(ptR,ptG,ptB);
            ctx.fillRect(llx, legY, lw, legH);
            ctx.fillRect(lrx, legY, lw, legH);
            ctx.fillStyle = c(ptR-6,ptG-6,ptB-4);
            ctx.fillRect(llx+lw*0.5, legY, Math.max(1,lw*0.08), legH);
            ctx.fillRect(lrx+lw*0.5, legY, Math.max(1,lw*0.08), legH);

            // Shoes (wide, polished black)
            ctx.fillStyle = c(14,12,14);
            ctx.fillRect(llx-2, bootY, lw+5, bootH*0.55);
            ctx.fillRect(lrx-2, bootY, lw+5, bootH*0.55);
            ctx.fillRect(llx-2, bootY+bootH*0.55, lw+6, bootH*0.45);
            ctx.fillRect(lrx-2, bootY+bootH*0.55, lw+6, bootH*0.45);
            // Shoe highlight (polished sheen)
            ctx.fillStyle = c(42,38,42);
            ctx.fillRect(llx, bootY+1, lw+1, bootH*0.18);
            ctx.fillRect(lrx, bootY+1, lw+1, bootH*0.18);

        } else {
            // === MILITARY SOLDIER (olive uniform + helmet) ===
            const skR=202,skG=162,skB=120;
            const unR=72, unG=84, unB=48;   // olive uniform
            const ptR=58, ptG=68, ptB=38;   // darker olive trousers
            const btR=40, btG=30, btB=18;   // dark brown boots
            const hlR=55, hlG=66, hlB=34;   // helmet

            // Helmet
            ctx.fillStyle = c(hlR,hlG,hlB);
            ctx.fillRect(sx+hm-4, headY, sw-hm*2+8, headH*0.38);
            // Helmet top ridge
            ctx.fillStyle = c(hlR-8,hlG-8,hlB-5);
            ctx.fillRect(sx+hm-2, headY, sw-hm*2+4, headH*0.08);
            // Helmet brim overhang
            ctx.fillStyle = c(hlR-10,hlG-10,hlB-6);
            ctx.fillRect(sx+hm-6, headY+headH*0.32, sw-hm*2+12, headH*0.10);
            // Helmet shade
            ctx.fillStyle = c(hlR+10,hlG+12,hlB+6);

    // ---- CROSSHAIR ---------------------------------------------------------
    function drawCrosshair() {
        const cx = CW / 2, cy = CH / 2;
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cx - 12, cy); ctx.lineTo(cx - 4, cy);
        ctx.moveTo(cx + 4,  cy); ctx.lineTo(cx + 12, cy);
        ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy - 4);
        ctx.moveTo(cx, cy + 4);  ctx.lineTo(cx, cy + 12);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, 1.5, 0, Math.PI * 2);
        ctx.stroke();
    }

    // ---- BULLET TRAILS -----------------------------------------------------
    function drawBulletTrails() {
        for (let i = bulletTrails.length - 1; i >= 0; i--) {
            const b = bulletTrails[i];
            const alpha = b.age / 7;
            ctx.save();
            ctx.shadowColor = 'rgba(255, 200, 50, 0.8)';
            ctx.shadowBlur = 8;
            ctx.strokeStyle = `rgba(255, 240, 120, ${alpha})`;
            ctx.lineWidth = alpha < 0.4 ? 1 : 2;
            ctx.beginPath();
            ctx.moveTo(b.x1, b.y1);
            ctx.lineTo(b.x2, b.y2);
            ctx.stroke();
            ctx.restore();
            b.age--;
            if (b.age <= 0) bulletTrails.splice(i, 1);
        }
    }

    // ---- SHOOT -------------------------------------------------------------
    function shoot() {
        if (!gameRunning) return;
        if (gun.cooldown > 0) return;
        if (player.ammo <= 0) return;

        player.ammo--;
        gun.recoil = 15;
        gun.muzzleFlash = 3;
        gun.cooldown = 12;

        // Bullet tracer from muzzle toward crosshair
        const muzzleX = 510;
        const muzzleY = CH - 30 - 84 - 38 - 38; // GY - slideH - barrelLen*2
        bulletTrails.push({ age: 7, x1: muzzleX, y1: muzzleY, x2: CW / 2, y2: CH / 2 });

        // Raycast for enemy hit
        const rdx = Math.cos(player.angle);
        const rdy = Math.sin(player.angle);

        let closest = null, closestDist = Infinity;
        for (const e of enemies) {
            if (!e.active) continue;
            const ex = e.x - player.x, ey = e.y - player.y;
            const dist = Math.sqrt(ex*ex + ey*ey);
            const eAngle = Math.atan2(ey, ex);
            let ad = eAngle - player.angle;
            while (ad >  Math.PI) ad -= 2*Math.PI;
            while (ad < -Math.PI) ad += 2*Math.PI;
            if (Math.abs(ad) < 0.18 && dist < closestDist && hasLOS(player.x, player.y, e.x, e.y)) {
                closest = e; closestDist = dist;
            }
        }
        if (closest) {
            closest.health -= 50;
            if (closest.health <= 0) {
                closest.active = false;
                closest.state = 'dead';
            } else {
                closest.state = 'alert';
            }
        }
    }

    // ---- LINE OF SIGHT -----------------------------------------------------
    function hasLOS(x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const steps = Math.ceil(dist / 8);
        for (let i = 1; i < steps; i++) {
            const t = i / steps;
            const tx = Math.floor((x1 + dx*t) / CS);
            const ty = Math.floor((y1 + dy*t) / CS);
            if (tx < 0 || tx >= MAP_WIDTH || ty < 0 || ty >= MAP_HEIGHT) return false;
            if (MAP[ty][tx] > 0) return false;
        }
        return true;
    }

    // ---- ENEMY AI ----------------------------------------------------------
    const PATROL_SPEED = 1.2;
    const CHASE_SPEED  = 2.0;
    const DETECT_DIST  = 700;   // pixels: sight range
    const CHASE_DIST   = 900;   // keep chasing up to this far
    const SHOOT_DIST   = 500;   // switch to shoot state within this range
    const LOSE_DIST    = 1100;  // give up if player gets this far

    function updateEnemies() {
        for (const e of enemies) {
            if (!e.active) continue;

            const dx = player.x - e.x, dy = player.y - e.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const los = dist < LOSE_DIST && hasLOS(e.x, e.y, player.x, player.y);

            if (e.state === 'patrol') {
                if (dist < DETECT_DIST && los) {
                    e.state = 'alert';
                } else {
                    moveToward(e, e.waypoint.x, e.waypoint.y, PATROL_SPEED);
                    const wpDx = e.waypoint.x - e.x, wpDy = e.waypoint.y - e.y;
                    if (Math.sqrt(wpDx*wpDx + wpDy*wpDy) < 12) {
                        e.waypoint = randomWaypoint();
                    }
                }
            } else if (e.state === 'alert') {
                if (!los) {
                    e.alertTime = (e.alertTime || 0) + 1;
                    if (e.alertTime > 180) { e.state = 'patrol'; e.alertTime = 0; }
                    // Keep moving toward last known position
                    moveToward(e, player.x, player.y, PATROL_SPEED);
                } else {
                    e.alertTime = 0;
                    if (dist <= SHOOT_DIST) {
                        e.state = 'shoot';
                    } else {
                        moveToward(e, player.x, player.y, CHASE_SPEED);
                    }
                }
            } else if (e.state === 'shoot') {
                if (!los || dist > SHOOT_DIST * 1.3) {
                    e.state = 'alert';
                } else {
                    // Strafe slightly while shooting
                    const strafe = Math.cos(e.strafeTimer || 0) * 0.8;
                    const perpX = -dy / dist, perpY = dx / dist;
                    const sx = e.x + perpX * strafe, sy = e.y + perpY * strafe;
                    if (!mapSolid(Math.floor(sx/CS), Math.floor(e.y/CS))) e.x = sx;
                    if (!mapSolid(Math.floor(e.x/CS), Math.floor(sy/CS))) e.y = sy;
                    e.strafeTimer = (e.strafeTimer || 0) + 0.05;

                    e.shootTimer = (e.shootTimer || 0) + 1;
                    if (e.shootTimer >= 75) { // ~1.25s at 60fps
                        e.shootTimer = 0;
                        if (gameRunning) {
                            player.health -= 10;
                            damageFlash = 8;
                        }
                    }
                }
                // If player moves away, give chase again
                if (dist > SHOOT_DIST * 1.3 && los) {
                    moveToward(e, player.x, player.y, CHASE_SPEED);
                }
            }
        }
    }

    function moveToward(e, tx, ty, speed) {
        const dx = tx - e.x, dy = ty - e.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 1) return;
        const nx = e.x + (dx/d) * speed;
        const ny = e.y + (dy/d) * speed;
        // Try diagonal move, fall back to axis-aligned slides
        const canX = !mapSolid(Math.floor((nx + Math.sign(dx)*8)/CS), Math.floor(e.y/CS));
        const canY = !mapSolid(Math.floor(e.x/CS), Math.floor((ny + Math.sign(dy)*8)/CS));
        if (canX) e.x = nx;
        if (canY) e.y = ny;
        // Wall-slide: if blocked on one axis try the other to unstick
        if (!canX && !canY) {
            const slideX = e.x + (dx/d) * speed;
            if (!mapSolid(Math.floor(slideX/CS), Math.floor(e.y/CS))) e.x = slideX;
        }
    }

    // ---- PLAYER MOVEMENT ---------------------------------------------------
    const SPEED = 2.5;
    const RADIUS = 10;

    function updatePlayer() {
        let dx = 0, dy = 0;

        // Arrow keys: left/right = turn, up/down = forward/back
        if (keys['ArrowLeft'])  player.angle -= 0.04;
        if (keys['ArrowRight']) player.angle += 0.04;

        const fwd   = (keys['KeyW'] || keys['ArrowUp'])   ? 1 : 0;
        const back  = (keys['KeyS'] || keys['ArrowDown'])  ? 1 : 0;
        const left  = keys['KeyA'] ? 1 : 0;   // A = strafe left
        const right = keys['KeyD'] ? 1 : 0;   // D = strafe right

        dx += Math.cos(player.angle) * (fwd - back) * SPEED;
        dy += Math.sin(player.angle) * (fwd - back) * SPEED;
        // Strafe (perpendicular)
        dx += Math.cos(player.angle + Math.PI/2) * (right - left) * SPEED;
        dy += Math.sin(player.angle + Math.PI/2) * (right - left) * SPEED;

        const moving = dx !== 0 || dy !== 0;

        if (moving) {
            player.bobPhase += 0.12;
            player.bobOffset = Math.sin(player.bobPhase) * 4;
        } else {
            player.bobOffset *= 0.85;
        }

        // Collision: check X and Y separately with radius corners
        if (dx !== 0) {
            const nx = player.x + dx;
            const checkY = [player.y - RADIUS, player.y, player.y + RADIUS];
            let canX = true;
            for (const cy of checkY) {
                if (mapSolid(Math.floor((nx + Math.sign(dx)*RADIUS) / CS), Math.floor(cy / CS))) {
                    canX = false; break;
                }
            }
            if (canX) player.x = nx;
        }
        if (dy !== 0) {
            const ny = player.y + dy;
            const checkX = [player.x - RADIUS, player.x, player.x + RADIUS];
            let canY = true;
            for (const cx of checkX) {
                if (mapSolid(Math.floor(cx / CS), Math.floor((ny + Math.sign(dy)*RADIUS) / CS))) {
                    canY = false; break;
                }
            }
            if (canY) player.y = ny;
        }
    }

    // ---- RADAR -------------------------------------------------------------
    function updateRadar() {
        const rw = radarCanvas.width, rh = radarCanvas.height;
        const worldW = MAP_WIDTH * CS, worldH = MAP_HEIGHT * CS;

        rctx.clearRect(0, 0, rw, rh);

        // Draw map tiles
        const tw = rw / MAP_WIDTH, th = rh / MAP_HEIGHT;
        for (let row = 0; row < MAP_HEIGHT; row++) {
            for (let col = 0; col < MAP_WIDTH; col++) {
                const t = MAP[row][col];
                if (t === 0) {
                    rctx.fillStyle = '#1a2a1a';
                } else if (t === 1) {
                    rctx.fillStyle = '#555';
                } else {
                    rctx.fillStyle = '#8b5a2b';
                }
                rctx.fillRect(col * tw, row * th, tw, th);
            }
        }

        // Enemies
        for (const e of enemies) {
            if (!e.active) continue;
            const ex = (e.x / worldW) * rw;
            const ey = (e.y / worldH) * rh;
            rctx.fillStyle = '#ff2222';
            rctx.shadowColor = '#ff0000';
            rctx.shadowBlur = 6;
            rctx.beginPath();
            rctx.arc(ex, ey, 4, 0, Math.PI * 2);
            rctx.fill();
            rctx.shadowBlur = 0;
        }

        // Player
        const px = (player.x / worldW) * rw;
        const py = (player.y / worldH) * rh;
        rctx.fillStyle = '#00ff00';
        rctx.beginPath();
        rctx.arc(px, py, 4, 0, Math.PI * 2);
        rctx.fill();

        // Player direction indicator
        rctx.strokeStyle = '#00ff00';
        rctx.lineWidth = 1.5;
        rctx.beginPath();
        rctx.moveTo(px, py);
        rctx.lineTo(px + Math.cos(player.angle) * 10, py + Math.sin(player.angle) * 10);
        rctx.stroke();
    }

    // ---- HUD ---------------------------------------------------------------
    const healthDisplay  = document.getElementById('healthDisplay');
    const healthBarFill  = document.getElementById('healthBarFill');
    const ammoDisplay    = document.getElementById('ammoDisplay');
    const enemyCount     = document.getElementById('enemyCount');
    const overlay        = document.getElementById('overlay');
    const overlayTitle   = document.getElementById('overlayTitle');

    function updateHUD() {
        healthDisplay.textContent = Math.max(0, player.health);
        const pct = Math.max(0, player.health) / 100;
        healthBarFill.style.width = (pct * 100) + '%';
        healthBarFill.style.background = pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ff9800' : '#f44336';

        const ammoBlocks = '█'.repeat(Math.ceil(player.ammo / 4)).padEnd(Math.ceil(player.maxAmmo / 4), '░');
        ammoDisplay.textContent = `${ammoBlocks} ${player.ammo}/${player.maxAmmo}`;

        const alive = enemies.filter(e => e.active).length;
        enemyCount.textContent = `\u{1F465} ${alive}`;
    }

    // ---- WIN / LOSE --------------------------------------------------------
    function checkWinLose() {
        if (!gameRunning) return;
        if (player.health <= 0) {
            gameRunning = false;
            overlayTitle.textContent = 'MISSION FAILED';
            overlayTitle.className = 'overlay-title lose-title';
            overlay.classList.add('show');
        }
        const alive = enemies.filter(e => e.active).length;
        if (alive === 0) {
            gameRunning = false;
            overlayTitle.textContent = 'MISSION COMPLETE';
            overlayTitle.className = 'overlay-title win-title';
            overlay.classList.add('show');
        }
    }

    // ---- DAMAGE FLASH ------------------------------------------------------
    function drawDamageFlash() {
        if (damageFlash <= 0) return;
        ctx.fillStyle = `rgba(200,0,0,${damageFlash * 0.04})`;
        ctx.fillRect(0, 0, CW, CH);
        damageFlash--;
    }

    // ---- MAIN LOOP ---------------------------------------------------------
    function loop(id) {
        if (!gameRunning || id !== loopId) return;

        updatePlayer();
        updateEnemies();

        // Gun timers
        if (gun.recoil > 0) gun.recoil--;
        if (gun.muzzleFlash > 0) gun.muzzleFlash--;
        if (gun.cooldown > 0) gun.cooldown--;

        render3D();
        drawEnemies();
        drawBulletTrails();
        drawWeapon();
        drawDamageFlash();
        drawCrosshair();

        updateHUD();
        updateRadar();
        checkWinLose();

        requestAnimationFrame(() => loop(id));
    }

    // ---- START / RESET -----------------------------------------------------
    function startGame() {
        document.getElementById('lobby').style.display = 'none';
        resetGame();
    }

    function resetGame() {
        overlay.classList.remove('show');
        gameRunning = false; // stop any running loop
        player = {
            x: 30 * CS,
            y: 42 * CS,
            angle: -Math.PI / 2,
            health: 100,
            ammo: 24,
            maxAmmo: 24,
            bobPhase: 0,
            bobOffset: 0
        };
        gun = { recoil: 0, muzzleFlash: 0, cooldown: 0 };
        damageFlash = 0;
        bulletTrails = [];
        spawnEnemies();
        gameRunning = true;
        const id = ++loopId;
        loop(id);
    }

    window.startGame = startGame;
    window.resetGame = resetGame;
    </script>
</body>
</html>
